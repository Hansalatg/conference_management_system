<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Feedback System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('./assets/bg1.jpeg ');
            background-size: cover;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .admin-container {
            width: 80%;
            margin: 20px auto;
            background-color: #faf5ff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(128, 0, 128, 0.2);
            border: 2px solid #d8b4fe;
        }

        h2 {
            text-align: center;
            color: #7e22ce;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th {
            background-color: #c084fc;
            color: white;
            padding: 12px;
            text-align: left;
            border: 1px solid #d8b4fe;
        }

        table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #d8b4fe;
            color: #6b21a8;
        }

        table tr:nth-child(even) {
            background-color: #f3e8ff;
        }

        table tr:hover {
            background-color: #e9d5ff;
        }

        .button-container {
            display: flex;
            gap: 10px;
        }

        button.delete-btn {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button.delete-btn:hover {
            background-color: #9333ea;
        }

        button.delete-btn:active {
            background-color: #7e22ce;
        }
    </style>
</head>
<body>

<!-- Admin Feedback View -->
<div class="admin-container" id="admin-view">
    <h2>All Feedbacks</h2>
    <table id="feedbackTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Rating</th>
                <th>Feedback</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Feedbacks will be populated here -->
        </tbody>
    </table>
</div>

<script>
    // Admin View Feedbacks
    window.addEventListener('load', function () {
        loadFeedbacks();
    });

    function loadFeedbacks() {
        fetch('http://localhost:3000/get-feedbacks')
            .then(response => response.json())
            .then(feedbacks => {
                const tableBody = document.querySelector('#feedbackTable tbody');
                tableBody.innerHTML = '';

                feedbacks.forEach(feedback => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${feedback.name}</td>
                        <td>${feedback.email}</td>
                        <td>${feedback.rating}</td>
                        <td>${feedback.feedback}</td>
                        <td class="button-container">
                            <button class="delete-btn" onclick="deleteFeedback(${feedback.id})">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            });
    }

    function deleteFeedback(id) {
        if (confirm('Are you sure you want to delete this feedback?')) {
            fetch(`http://localhost:3000/delete-feedback/${id}`, {
                method: 'DELETE',
            })
            .then(response => response.json())
            .then(result => {
                alert(result.message);
                loadFeedbacks();
            })
            .catch(error => console.error('Error:', error));
        }
    }
</script>

</body>
</html>
