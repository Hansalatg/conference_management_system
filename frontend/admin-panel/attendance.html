<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback and Attendance System</title>
    <style>
        /* Basic styles for the page */
        .attendance-container {
            width: 80%;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
        }

        .attendance-table th, .attendance-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
        }

        .attendance-table th {
            background-color: #f4f4f4;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-container input {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .search-container button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }

        .search-container button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<!-- Attendance Section -->
<div class="attendance-container">
    <h2>Participant Attendance</h2>
    
    <div class="search-container">
        <input type="text" id="sessionId" placeholder="Enter Session ID">
        <button id="searchBtn">Search Attendance</button>
    </div>

    <!-- Attendance Table -->
    <table class="attendance-table" id="attendanceTable">
        <thead>
            <tr>
                <th>Attendance ID</th>
                <th>Participant ID</th>
                <th>Session ID</th>
                <th>Check-in Time</th>
            </tr>
        </thead>
        <tbody id="attendanceData">
            <!-- Attendance data will be displayed here -->
        </tbody>
    </table>

    <!-- Form to Add Attendance -->
    
</div>

<script>
    // Fetch Attendance Data based on Session ID
    document.getElementById('searchBtn').addEventListener('click', function() {
        const sessionId = document.getElementById('sessionId').value.trim();

        if (!sessionId) {
            alert('Please enter a session ID to search.');
            return;
        }

        fetchAttendance(sessionId);
    });

    // Add new Attendance Record
    document.getElementById('addAttendanceBtn').addEventListener('click', function() {
        const participantId = document.getElementById('participantId').value.trim();
        const sessionId = document.getElementById('sessionIdInput').value.trim();

        if (!participantId || !sessionId) {
            alert('Please enter both Participant ID and Session ID.');
            return;
        }

        addAttendance(participantId, sessionId);
    });

    // Fetch Attendance Data based on Session ID
    function fetchAttendance(sessionId) {
        fetch(`http://localhost:3000/get-attendance?sessionId=${sessionId}`)
            .then(response => response.json())
            .then(data => {
                const attendanceData = document.getElementById('attendanceData');
                attendanceData.innerHTML = '';  // Clear previous data

                if (data.length > 0) {
                    data.forEach(record => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${record.attendance_id}</td>
                            <td>${record.participant_id}</td>
                            <td>${record.session_id}</td>
                            <td>${record.check_in_time}</td>
                        `;
                        attendanceData.appendChild(row);
                    });
                } else {
                    attendanceData.innerHTML = '<tr><td colspan="4">No attendance records found for this session.</td></tr>';
                }
            })
            .catch(error => {
                console.error('Error fetching attendance:', error);
                alert('Error fetching attendance data.');
            });
    }

    // Add Attendance Record to Database
    function addAttendance(participantId, sessionId) {
        const checkInTime = new Date().toISOString();  // Get the current date and time in ISO format

        fetch('http://localhost:3000/add-attendance', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                participant_id: participantId,
                session_id: sessionId,
                check_in_time: checkInTime,
            }),
        })
        .then(response => response.json())
        .then(data => {
            alert('Attendance added successfully!');
            fetchAttendance(sessionId);  // Refresh attendance data
        })
        .catch(error => {
            console.error('Error adding attendance:', error);
            alert('Error adding attendance data.');
        });
    }
</script>

</body>
</html>
