<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Day Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: url('participants-panel/assets/bg3.jpg'); /* Background image */
            background-size: cover;
            background-position: center;
            color: #ffffff;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: black;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in-out;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.8;
            animation: fadeIn 1.2s ease-in-out;
            color: #6A0DAD;
        }

        .btn-custom {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(90deg, #6A0DAD, #9B30FF);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .btn-custom:hover {
            background: linear-gradient(90deg, #9B30FF, #6A0DAD);
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
        }

        /* Animation for text fade-in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<h1>Welcome to the Conference Day Management System</h1>
<p>Your gateway to a seamless conference experience.</p>
<button class="btn-custom" onclick="window.location.href='index.html'">Continue</button>

<script>
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let lines = [];
    const maxLineDistance = 150;

    class Particle {
        constructor(x, y, size, speedX, speedY) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.speedX = speedX;
            this.speedY = speedY;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x <= 0 || this.x >= canvas.width) this.speedX *= -1;
            if (this.y <= 0 || this.y >= canvas.height) this.speedY *= -1;
        }

        draw() {
            const color = Math.random() > 0.5 ? "rgba(128, 0, 128, 0.7)" : "rgba(0, 0, 0, 0.7)"; // Purple or Black
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        }
    }

    class Line {
        constructor(x1, y1, x2, y2) {
            this.x1 = x1;
            this.y1 = y1;
            this.x2 = x2;
            this.y2 = y2;
        }

        draw() {
            ctx.strokeStyle = "rgba(128, 0, 128, 0.5)";
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(this.x1, this.y1);
            ctx.lineTo(this.x2, this.y2);
            ctx.stroke();
        }
    }

    function createParticles() {
        particles = [];
        for (let i = 0; i < 150; i++) {
            let size = Math.random() * 5 + 1;
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            let speedX = (Math.random() - 0.5) * 3;
            let speedY = (Math.random() - 0.5) * 3;
            particles.push(new Particle(x, y, size, speedX, speedY));
        }
    }

    function createLines() {
        lines = [];
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                let dist = Math.sqrt(Math.pow(particles[i].x - particles[j].x, 2) + Math.pow(particles[i].y - particles[j].y, 2));
                if (dist < maxLineDistance) {
                    lines.push(new Line(particles[i].x, particles[i].y, particles[j].x, particles[j].y));
                }
            }
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((particle) => {
            particle.update();
            particle.draw();
        });

        createLines();
        lines.forEach((line) => {
            line.draw();
        });

        requestAnimationFrame(animateParticles);
    }

    createParticles();
    animateParticles();

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        createParticles();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
